name: Simple Pipeline

on:
  push   :
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build Stage
        run: echo "Build completed"

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Test Stage
        run: cat test/samples.txt 

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy Stage
        run: echo "Deployment successful"
